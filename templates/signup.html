{% extends 'base.html' %}
{% block title %}Sign Up – VeloraDrive{% endblock %}

{% block content %}
<div class="auth-page d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="auth-card">
          <div class="text-center mb-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none">
              <h3 class="fw-bold text-white"><i class="fas fa-car-side me-2 text-accent"></i>Velora<span class="text-accent">Drive</span></h3>
            </a>
            <p class="text-white mt-2">Create your account and start driving.</p>
          </div>

          <form method="POST" action="{{ url_for('auth.signup') }}" novalidate id="signupForm">
            <div class="mb-3">
              <label class="form-label text-white small">Full Name *</label>
              <div class="input-group">
                <span class="input-group-text bg-dark-3 border-secondary"><i class="fas fa-user text-white"></i></span>
                <input type="text" name="full_name" class="form-control bg-dark-3 border-secondary text-white" placeholder="John Doe" required minlength="2">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-white small">Email Address *</label>
              <div class="input-group">
                <span class="input-group-text bg-dark-3 border-secondary"><i class="fas fa-envelope text-white"></i></span>
                <input type="email" name="email" class="form-control bg-dark-3 border-secondary text-white" placeholder="you@example.com" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-white small">Phone Number</label>
              <div class="input-group">
                <span class="input-group-text bg-dark-3 border-secondary"><i class="fas fa-phone text-white"></i></span>
                <input type="tel" name="phone" class="form-control bg-dark-3 border-secondary text-white" placeholder="+1 555 000 1234">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-white small">Password * <span class="text-white">(min 6 characters)</span></label>
              <div class="input-group">
                <span class="input-group-text bg-dark-3 border-secondary"><i class="fas fa-lock text-white"></i></span>
                <input type="password" name="password" id="signupPwd" class="form-control bg-dark-3 border-secondary text-white" placeholder="••••••••" required minlength="6">
                <button class="input-group-text bg-dark-3 border-secondary text-white" type="button" onclick="togglePwd('signupPwd',this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label text-white small">Confirm Password *</label>
              <div class="input-group">
                <span class="input-group-text bg-dark-3 border-secondary"><i class="fas fa-lock-open text-white"></i></span>
                <input type="password" name="confirm_password" id="confirmPwd" class="form-control bg-dark-3 border-secondary text-white" placeholder="••••••••" required minlength="6">
                <button class="input-group-text bg-dark-3 border-secondary text-white" type="button" onclick="togglePwd('confirmPwd',this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div id="pwdMatchMsg" class="form-text"></div>
            </div>

            <button type="submit" class="btn btn-accent w-100 py-2 fw-semibold">
              <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
          </form>

          <p class="text-center text-white mt-4 small">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="text-accent text-decoration-none fw-semibold">Sign In</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

document.getElementById('confirmPwd').addEventListener('input', function() {
  const pwd = document.getElementById('signupPwd').value;
  const msg = document.getElementById('pwdMatchMsg');
  if (this.value && this.value !== pwd) {
    msg.className = 'form-text text-danger';
    msg.textContent = 'Passwords do not match.';
  } else if (this.value && this.value === pwd) {
    msg.className = 'form-text text-success';
    msg.textContent = 'Passwords match!';
  } else {
    msg.textContent = '';
  }
});
</script>
{% endblock %}
