{% extends 'base.html' %}
{% block title %}Login – VeloraDrive{% endblock %}

{% block content %}
<div class="auth-page d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="auth-card">
          <div class="text-center mb-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none">
              <h3 class="fw-bold text-white"><i class="fas fa-car-side me-2 text-accent"></i>Velora<span class="text-accent">Drive</span></h3>
            </a>
            <p class="text-white mt-2">Welcome back! Sign in to continue.</p>
          </div>

          <!-- Role Tabs -->
          <ul class="nav nav-pills nav-fill mb-4 p-1 rounded-3 bg-dark-3">
            <li class="nav-item">
              <button class="nav-link active" id="userTab" onclick="setRole('user')">
                <i class="fas fa-user me-1"></i>User
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link" id="adminTab" onclick="setRole('admin')">
                <i class="fas fa-shield-halved me-1"></i>Admin
              </button>
            </li>
          </ul>

          <form method="POST" action="{{ url_for('auth.login') }}" novalidate id="loginForm">
            <input type="hidden" name="role" id="roleField" value="user">

            <div class="mb-3">
              <label class="form-label text-white small">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-dark-3 border-secondary"><i class="fas fa-envelope text-white"></i></span>
                <input type="email" name="email" class="form-control bg-dark-3 border-secondary text-white" placeholder="you@example.com" required autocomplete="email">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label text-white small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-dark-3 border-secondary"><i class="fas fa-lock text-white"></i></span>
                <input type="password" name="password" id="loginPwd" class="form-control bg-dark-3 border-secondary text-white" placeholder="••••••••" required autocomplete="current-password">
                <button class="input-group-text bg-dark-3 border-secondary text-white" type="button" onclick="togglePwd('loginPwd',this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-accent w-100 py-2 fw-semibold">
              <i class="fas fa-right-to-bracket me-2"></i>Sign In
            </button>
          </form>

          <p class="text-center text-white mt-4 small">
            Don't have an account?
            <a href="{{ url_for('auth.signup') }}" class="text-accent text-decoration-none fw-semibold">Sign Up</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function setRole(role) {
  document.getElementById('roleField').value = role;
  document.getElementById('userTab').classList.toggle('active', role === 'user');
  document.getElementById('adminTab').classList.toggle('active', role === 'admin');
}
function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
{% endblock %}
